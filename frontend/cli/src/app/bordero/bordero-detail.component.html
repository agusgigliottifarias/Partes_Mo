<div *ngIf="bordero" class="container mt-4">
  <h2 class="mb-4">
    {{ bordero.id ? "Bordero Nº " + bordero.id : "Nuevo bordero" }}
  </h2>

  <form #form="ngForm">
    <div class="form-group card p-3 bg-light shadow-sm">
      <label><strong>1. Elegí la Fecha de la Función:</strong></label>
      <br>
      
      <ngb-datepicker 
        name="datePicker" 
        [(ngModel)]="borderoDate" 
        navigation="select">
      </ngb-datepicker>
      
      <div class="mt-3 p-2 border rounded bg-white" *ngIf="borderoDate">
        <strong>Fecha seleccionada:</strong> 
        <span class="text-primary ml-2" style="font-size: 1.2em; font-weight: bold;">
          {{borderoDate.year}} / {{borderoDate.month}} / {{borderoDate.day}}
        </span>
      </div>
    </div>

    <div class="form-group mt-4">
      <label><strong>2. Cliente (Teatro):</strong></label>
      <input
        [(ngModel)]="bordero.customer"
        name="customer"
        placeholder="Escribí para buscar el teatro..."
        class="form-control"
        required
        [ngbTypeahead]="searchCustomer"
        [editable]="false"
        [resultFormatter]="resultFormat"
        [inputFormatter]="inputFormat"
      >
      <small *ngIf="searching" class="form-text text-muted">Buscando en la base de datos...</small>
    </div>

    <div class="table-responsive mt-4">
      <table class="table table-striped table-bordered shadow-sm">
        <thead class="thead-dark">
          <tr>
            <th>Obra</th>
            <th style="width: 200px;">Audiencia</th>
            <th class="text-center">
              <button type="button" (click)="addPerformance()" class="btn btn-success btn-sm">
                <i class="fa fa-plus"></i> Agregar Obra
              </button>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="bordero.performances.length === 0">
            <td colspan="3" class="text-center text-muted py-3">
              No hay obras agregadas. Hacé clic en "Agregar Obra".
            </td>
          </tr>

          <tr *ngFor="let performance of bordero.performances; index as i">
            <td>
              <input
                [(ngModel)]="performance.play"
                name="play{{i}}"
                placeholder="Buscar obra..."
                class="form-control"
                required
                [ngbTypeahead]="searchPlay"
                [editable]="false"
                [resultFormatter]="resultFormat"
                [inputFormatter]="inputFormat"
              >
            </td>
            <td>
              <input 
                type="number" 
                [(ngModel)]="performance.audience" 
                name="audience{{i}}" 
                class="form-control" 
                placeholder="0"
                required
              >
            </td>
            <td class="text-center">
              <button type="button" (click)="removePerformance(performance)" class="btn btn-danger btn-sm">
                <i class="fa fa-trash"></i> Borrar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-5 mb-5 border-top pt-3 d-flex justify-content-end">
      <button type="button" (click)="goBack()" class="btn btn-secondary mr-2">
        Atrás
      </button>
      <button 
        type="button" 
        (click)="save()" 
        [disabled]="form.invalid" 
        class="btn btn-primary px-4 shadow">
        Guardar Bordero
      </button>
    </div>
  </form>
</div>
