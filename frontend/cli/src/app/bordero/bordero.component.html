<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">Listado de Borderos</h2>
    <a routerLink="/borderos/new" class="btn btn-success">
      <i class="fa fa-plus"></i> Nuevo Bordero
    </a>
  </div>

  <div class="table-responsive shadow-sm">
    <table class="table table-striped table-hover bg-white">
      <thead class="thead-dark">
        <tr>
          <th># ID</th>
          <th>Fecha (Año/Mes/Día)</th>
          <th>Teatro (Cliente)</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="borderos.length === 0">
          <td colspan="4" class="text-center text-muted py-4">
            No hay borderos registrados.
          </td>
        </tr>

        <tr *ngFor="let b of borderos">
          <td><strong>{{ b.id }}</strong></td>
          
          <td>{{ b.date | date:'yyyy/MM/dd' }}</td>
          
          <td>{{ b.customer?.name || 'Sin cliente' }}</td>
          
          <td class="text-center">
            <a [routerLink]="['/borderos', b.id]" class="btn btn-primary btn-sm">
              Editar
            </a>
            <button (click)="delete(b.id)" class="btn btn-outline-danger btn-sm ml-2">
              Borrar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
