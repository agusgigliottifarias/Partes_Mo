<nav aria-label="Navegación de páginas">
  <ul class="pagination pagination-lg flex-wrap justify-content-center mt-4">
    
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link" (click)="onPageChange(currentPage - 1)" style="cursor: pointer;">
        Previous
      </a>
    </li>

    <li class="page-item" 
        *ngFor="let p of pages" 
        [class.active]="p === currentPage">
      <a class="page-link" (click)="onPageChange(p)" style="cursor: pointer;">
        {{ p }}
      </a>
    </li>

    <li class="page-item" [class.disabled]="last">
      <a class="page-link" (click)="onPageChange(currentPage + 1)" style="cursor: pointer;">
        Next
      </a>
    </li>

  </ul>
</nav>
